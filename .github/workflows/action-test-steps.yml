name: action-test (steps)
on:
  workflow_call:
    inputs:
      variant:
        description: 'Action variant to test: docker or source'
        type: string
        required: true
      version:
        description: 'Version passed to source action (github.sha)'
        type: string
        default: ''

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: generate test coverage
        run: go test ./... -coverprofile=./cover.out -covermode=atomic

      - name: set action image version to dev
        if: inputs.variant == 'docker'
        run: |
          yq e -i '.runs.image = "docker://ghcr.io/vladopajic/go-test-coverage:dev"' action.yml
          image=$(yq '.runs.image' action.yml)
          echo "Image: $image"

      ## Test 1

      - name: "test: total coverage 0% (config)"
        if: inputs.variant == 'docker'
        uses: ./
        id: test-1-docker
        with:
          config: ./.github/workflows/testdata/zero.yml

      - name: "test: total coverage 0% (config)"
        if: inputs.variant == 'source'
        uses: ./action/source/.
        id: test-1-source
        with:
          version: ${{ inputs.version }}
          config: ./.github/workflows/testdata/zero.yml

      - name: "check: test output values"
        if: |
          steps.test-1-docker.outputs.total-coverage == '' && steps.test-1-source.outputs.total-coverage == '' ||
          steps.test-1-docker.outputs.badge-text == ''      && steps.test-1-source.outputs.badge-text == ''      ||
          steps.test-1-docker.outputs.badge-color == ''     && steps.test-1-source.outputs.badge-color == ''     ||
          steps.test-1-docker.outputs.report == ''          && steps.test-1-source.outputs.report == ''
        run: echo "Previous step should have output values" && exit 1

      ## Test 2

      - name: "test: total coverage 100% (config)"
        if: inputs.variant == 'docker'
        uses: ./
        id: test-2-docker
        continue-on-error: true
        with:
          config: ./.github/workflows/testdata/total100.yml

      - name: "test: total coverage 100% (config)"
        if: inputs.variant == 'source'
        uses: ./action/source/.
        id: test-2-source
        continue-on-error: true
        with:
          version: ${{ inputs.version }}
          config: ./.github/workflows/testdata/total100.yml

      - name: "check: test should have failed"
        if: steps.test-2-docker.outcome != 'failure' && steps.test-2-source.outcome != 'failure'
        run: echo "Previous step should have failed" && exit 1

      - name: "check: test output values"
        if: |
          steps.test-2-docker.outputs.total-coverage == '' && steps.test-2-source.outputs.total-coverage == '' ||
          steps.test-2-docker.outputs.badge-text == ''      && steps.test-2-source.outputs.badge-text == ''      ||
          steps.test-2-docker.outputs.badge-color == ''     && steps.test-2-source.outputs.badge-color == ''
        run: echo "Previous step should have output values" && exit 1

      ## Test 3

      - name: "test: total coverage 0% (inputs)"
        if: inputs.variant == 'docker'
        uses: ./
        id: test-3-docker
        with:
          profile: cover.out
          threshold-file: 0
          threshold-package: 0
          threshold-total: 0

      - name: "test: total coverage 0% (inputs)"
        if: inputs.variant == 'source'
        uses: ./action/source/.
        id: test-3-source
        with:
          version: ${{ inputs.version }}
          profile: cover.out
          threshold-file: 0
          threshold-package: 0
          threshold-total: 0

      ## Test 4

      - name: "test: total coverage 100% (inputs)"
        if: inputs.variant == 'docker'
        uses: ./
        id: test-4-docker
        continue-on-error: true
        with:
          profile: cover.out
          threshold-file: 0
          threshold-package: 0
          threshold-total: 100

      - name: "test: total coverage 100% (inputs)"
        if: inputs.variant == 'source'
        uses: ./action/source/.
        id: test-4-source
        continue-on-error: true
        with:
          version: ${{ inputs.version }}
          profile: cover.out
          threshold-file: 0
          threshold-package: 0
          threshold-total: 100

      - name: "check: test should have failed"
        if: steps.test-4-docker.outcome != 'failure' && steps.test-4-source.outcome != 'failure'
        run: echo "Previous step should have failed" && exit 1

      ## Test 5

      - name: "test: override config"
        if: inputs.variant == 'docker'
        uses: ./
        id: test-5-docker
        with:
          config: ./.github/workflows/testdata/total100.yml
          threshold-file: 0
          threshold-package: 0
          threshold-total: 0

      - name: "test: override config"
        if: inputs.variant == 'source'
        uses: ./action/source/.
        id: test-5-source
        with:
          version: ${{ inputs.version }}
          config: ./.github/workflows/testdata/total100.yml
          threshold-file: 0
          threshold-package: 0
          threshold-total: 0

      ## Test 6

      - name: "test: debug output"
        if: inputs.variant == 'docker'
        uses: ./
        id: test-6-docker
        continue-on-error: true
        with:
          profile: unexistant-profile.out
          debug: true
          threshold-file: 0
          threshold-package: 0
          threshold-total: 100

      - name: "test: debug output"
        if: inputs.variant == 'source'
        uses: ./action/source/.
        id: test-6-source
        continue-on-error: true
        with:
          version: ${{ inputs.version }}
          profile: unexistant-profile.out
          debug: true
          threshold-file: 0
          threshold-package: 0
          threshold-total: 100

      - name: "check: test should have failed"
        if: steps.test-6-docker.outcome != 'failure' && steps.test-6-source.outcome != 'failure'
        run: echo "Previous step should have failed" && exit 1
