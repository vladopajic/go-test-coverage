name: release
on:
  push:
    tags:
      - "v[0-9]+\\.[0-9]+\\.[0-9]+"
jobs:
  release:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: set RELEASE_VERSION env
        run: echo "RELEASE_VERSION=${GITHUB_REF:10}" >> $GITHUB_ENV
      
      - name: set MAJOR_VERSION env
        run: |
          MAJOR_VERSION="${RELEASE_VERSION:0:2}"
          echo "MAJOR_VERSION=$MAJOR_VERSION" >> $GITHUB_ENV

      - name: echo env var
        run: |
          echo "Release version: ${{ env.RELEASE_VERSION }}"
          echo "Major version: ${{ env.MAJOR_VERSION }}"

      - name: ensure image version is set to release version
        run: |
          image=$(yq '.runs.image' action.yml)
          echo "Image version: $image"
          [[ "$image" == *"${{ env.RELEASE_VERSION }}" ]]

      - name: login to GitHub container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
          provenance: false
          sbom: false
          tags: |
            ghcr.io/vladopajic/go-test-coverage:${{ env.RELEASE_VERSION }}
            ghcr.io/vladopajic/go-test-coverage:${{ env.MAJOR_VERSION }}
            ghcr.io/vladopajic/go-test-coverage:latest

      - name: point major version tag latest release version
        uses: actions/publish-action@v0.4.0
        with:
          source-tag: ${{ env.RELEASE_VERSION }}

      - name: build release binaries
        run: |
          mkdir -p dist

          for target in \
            "linux amd64" \
            "linux arm64" \
            "darwin amd64" \
            "darwin arm64" \
            "windows amd64" \
            "windows arm64"
          do
            set -- $target
            os=$1
            arch=$2
            asset_name="go-test-coverage_${RELEASE_VERSION}_${os}_${arch}"
            binary_name="go-test-coverage"

            if [ "$os" = "windows" ]; then
              binary_name="${binary_name}.exe"
            fi

            mkdir -p "dist/${asset_name}"

            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "dist/${asset_name}/${binary_name}" \
              .

            if [ "$os" = "windows" ]; then
              (cd "dist/${asset_name}" && zip -q "../${asset_name}.zip" "${binary_name}")
            else
              tar -C "dist/${asset_name}" -czf "dist/${asset_name}.tar.gz" "${binary_name}"
            fi
          done

      - name: upload release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${RELEASE_VERSION}" dist/*.tar.gz dist/*.zip --clobber
